services:
  imagentj:
    image: imagentj:cpu #-with-chat-history
    build:
      context: .
      target: cpu
    ports:
      # Bind to localhost only by default for security
      # Change to "0.0.0.0:6080:6080" if you need network access (not recommended)
      - "0.0.0.0:6080:6080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPEN_ROUTER_API_KEY=${OPEN_ROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
      - LANGSMITH_TRACING=${LANGSMITH_TRACING:-true}
      - LANGSMITH_ENDPOINT=${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      - LANGSMITH_PROJECT=${LANGSMITH_PROJECT:-}
      - LANGCHAIN_CALLBACKS_BACKGROUND=${LANGCHAIN_CALLBACKS_BACKGROUND:-true}
      - FIJI_PATH=/opt/Fiji.app
      - QDRANT_DATA_PATH=/app/qdrant_data
      - DISPLAY=:1
      # Optional: Set a VNC password (recommended if exposing to network)
      - VNC_PASSWORD=${VNC_PASSWORD:-}
      - PYTHONPATH=/app:/app/src:/app/extra_packages

    volumes:
      # Fiji plugin persistence — seeded from image on first run by entrypoint
      - fiji_plugins:/opt/Fiji.app/plugins
      - fiji_jars:/opt/Fiji.app/jars
      # DeepImageJ APPOSE framework environments (TF, PyTorch) — persisted so
      # they are created once on first model run and reused on every subsequent start
      - appose_envs:/opt/appose
      # Saved scripts persistence
      - saved_scripts:/app/scripts/saved_scripts
      # Qdrant vector database for plugin search and RAG
      # Named volume so Docker initialises it with the correct imagentj ownership from the image.
      # (dev compose overrides this with a bind mount for direct host access)
      - qdrant_data:/app/qdrant_data
      # Image data directory (place images in ./data on host, access as /mnt/data in container)
      - ${IMAGE_DATA_DIR:-./data}:/data
      # Source code mount for development (remove in production image)
      - ./src:/app/src:ro
      - ./gui_runner.py:/app/gui_runner.py:ro
      # Folder to save data
      - ./data:/app/data
      # Folder for skills
      - ./skills:/app/skills:ro
      # Entrypoint bind-mount so changes take effect without rebuilding
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro
    env_file:
      - path: .env
        required: false
    shm_size: '2gb'

    networks:
      - imagent_net

    # ── Resource limits ────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          memory: 2G

    # ── Security hardening ──────────────────────────────────────────────────
    # Run as non-root (also set in Dockerfile, belt-and-suspenders)
    user: "imagentj"
    # Prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Drop all Linux capabilities — none are needed
    cap_drop:
      - ALL

volumes:
  fiji_plugins:
  fiji_jars:
  saved_scripts:
  qdrant_data:
  appose_envs:

networks:
  imagent_net:
    ipam:
      driver: default
      config:
        # Using 10.10.10.0/24 is usually safe from 172.x conflicts
        - subnet: 10.10.10.0/24
